<table mat-table [dataSource]="tableData" class="mat-elevation-z8 custom-table"  >
    <ng-container matColumnDef="Name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"  (click)="openDialog(element)">
            {{ element.name }}
        </td>
    </ng-container>
    <ng-container matColumnDef="Product">
        <th mat-header-cell *matHeaderCellDef> Product </th>
        <td mat-cell *matCellDef="let element">
            {{ element.product }}
        </td>
    </ng-container>
    <ng-container matColumnDef="Amount">
        <th mat-header-cell *matHeaderCellDef> Amount </th>
        <td mat-cell *matCellDef="let element">
            {{ element.amount | currency}}
        </td>
    </ng-container>
   
    <ng-container matColumnDef="Status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element" >
            <span class="status-badge" [ngClass]=diverseStyle(element.status)>
                {{ this.status.getStatusCode(element.status) }}
            </span>
        </td>
    </ng-container>
    <ng-container matColumnDef="Date">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let element">
            {{ element.date | date}}
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
